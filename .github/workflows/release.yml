name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: spacedb-core-linux-amd64
            ext: ''
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: spacedb-core-linux-arm64
            ext: ''
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            asset: spacedb-core-windows-amd64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: core/go.sum
      - name: build
        working-directory: core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags="-s -w" -o "${{ matrix.asset }}${{ matrix.ext }}" ./cmd/spacedb-core
          sha256sum "${{ matrix.asset }}${{ matrix.ext }}" > "${{ matrix.asset }}${{ matrix.ext }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            core/${{ matrix.asset }}${{ matrix.ext }}
            core/${{ matrix.asset }}${{ matrix.ext }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: list
        run: ls -la artifacts
      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
